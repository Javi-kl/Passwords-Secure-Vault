services:
  # ── Base de datos ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vault_user
      POSTGRES_PASSWORD: vault_pass
      POSTGRES_DB: vault_db
    ports:
      - "5432:5432"
      
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:z
    healthcheck:
      # pg_isready retorna 0 solo cuando la BD acepta conexiones
      # Sin esto, la app intenta conectar antes de que Postgres esté listo
      test: ["CMD-SHELL", "pg_isready -U vault_user -d vault_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Aplicación FastAPI ─────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # El host de BD es "db", no "localhost"
      DATABASE_URL: postgresql://vault_user:vault_pass@db:5432/vault_db
      TEST_DATABASE_URL: postgresql://vault_user:vault_pass@db:5432/vault_test_db
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      # En desarrollo sin HTTPS: 0. En producción con HTTPS: 1
      COOKIE_SECURE: ${COOKIE_SECURE:-0}
      VAULT_CACHE_DIR: /app/tmp_vault_sessions 
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Persiste cache de claves Fernet entre reinicios del contenedor
      - vault_sessions:/app/tmp_vault_sessions
    

volumes:
  postgres_data:
  vault_sessions: