name: CI

on: 
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vault_user
          POSTGRES_PASSWORD: vault_pass
          POSTGRES_DB: vault_db  
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
        env:
          DATABASE_URL: postgresql://vault_user:vault_pass@localhost:5432/vault_db
          TEST_DATABASE_URL: postgresql://vault_user:vault_pass@localhost:5432/vault_db
          SECRET_KEY: ci-test-secret-key-do-not-use-in-prod-abc1234567890
          ALGORITHM: HS256
          VAULT_CACHE_DIR: /tmp/vault_sessions
          COOKIE_SECURE: "0"
      